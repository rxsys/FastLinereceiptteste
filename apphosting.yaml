runConfig:
  maxInstances: 1
scripts:
  buildCommand: npm install && npm run build
env:
  - variable: NODE_ENV
    value: production
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
# NEXT_PUBLIC_APP_URL será detectada automaticamente ou deve ser configurada no painel do App Hosting para cada ambiente (teste/prod)
